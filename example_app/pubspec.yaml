name: haptify_demo
description: "Demo app for haptify: bundled sounds with pregenerated haptics, plus runtime conversion of uploaded audio."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  audioplayers: ^6.8.1
  file_picker: ^10.0.0
  flutter:
    sdk: flutter
  gaimon: ^1.4.3
  haptify:
    path: ..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/haptics/
